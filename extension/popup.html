<!DOCTYPE html>
<html>
<head>
  <link rel="icon" type="image/png" href="icon32.png">
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      width: 250px;
      margin: 0;
      padding: 16px;
      background: #f9f9ff;
      color: #181c22;
    }
    .popup-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 12px;
    }
    h3 {
      margin: 0;
      font-size: 16px;
      color: #005db2;
    }
    #word-count {
      flex-shrink: 0;
      padding: 2px 8px;
      border-radius: 999px;
      background: #e7f0ff;
      color: #005db2;
      font-size: 12px;
      font-weight: 700;
    }
    #word-list {
      list-style-type: none;
      padding: 0;
      margin: 0 0 16px 0;
      max-height: 200px;
      overflow-y: auto;
    }
    #word-list li {
      padding: 6px 8px;
      background: #ffffff;
      border: 1px solid #e6e6e6;
      border-radius: 4px;
      margin-bottom: 4px;
      font-size: 14px;
      display: flex;
      justify-content: space-between;
    }
    .delete-btn {
      color: #ba1a1a;
      cursor: pointer;
      background: none;
      border: none;
      font-size: 12px;
    }
    button.primary {
      width: 100%;
      background: #005db2;
      color: white;
      border: none;
      padding: 8px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
    }
    button.primary:hover {
      background: #005bab;
    }
    button:disabled {
      background: #a8c8ff;
      cursor: not-allowed;
    }
    .empty-state {
      font-size: 12px;
      color: #717784;
      text-align: center;
      margin-bottom: 16px;
    }
    .topic-section {
      margin-bottom: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    label {
      font-size: 12px;
      font-weight: 600;
    }
    select, input[type="text"] {
      width: 100%;
      padding: 6px;
      border: 1px solid #e6e6e6;
      border-radius: 4px;
      font-size: 14px;
      box-sizing: border-box;
    }
    #new-topic-container {
      display: none;
    }
  </style>
</head>
<body>
  <div class="popup-header">
    <div style="display: flex; align-items: center; gap: 8px;">
      <img src="icon48.png" width="22" height="22" alt="MinusLearn" style="border-radius: 4px; object-fit: contain;" />
      <h3>MinusLearn Clipper</h3>
    </div>
    <span id="word-count">0 words</span>
  </div>
  <div id="empty-state" class="empty-state">No words collected yet. Highlight a word and right-click to add!</div>
  
  <ul id="word-list"></ul>

  <div class="topic-section">
    <label for="topic-select">Destination Topic:</label>
    <select id="topic-select">
      <option value="new_topic_option">[ + ] Create New Topic</option>
    </select>
    
    <div id="new-topic-container">
      <input type="text" id="new-topic-input" placeholder="Enter new topic name..." />
    </div>
  </div>

  <button id="send-btn" class="primary" disabled>Send to MinusLearn</button>
  <script src="popup.js"></script>
</body>
</html>
